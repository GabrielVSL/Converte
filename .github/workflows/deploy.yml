name: Deploy Automático CasaOS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Baixar o código mais recente
        uses: actions/checkout@v4

      - name: Fazer o Build e Subir o Contêiner
        run: |
          cd /DATA/AppData/Converte/converte
          docker compose up -d --build

      - name: Fazer o Build e Subir o Contêiner
        run: |
          cd /DATA/AppData/Converte/converte
          sudo docker compose up -d --build